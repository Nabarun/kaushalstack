services:
  pocketbase:
    image: nabarun1/kaushalstack-pocketbase:latest
    restart: always
    environment:
      PB_SUPERUSER_EMAIL: ${PB_SUPERUSER_EMAIL}
      PB_SUPERUSER_PASSWORD: ${PB_SUPERUSER_PASSWORD}
      PB_ENCRYPTION_KEY: ${PB_ENCRYPTION_KEY}

  api:
    image: nabarun1/kaushalstack-api:latest
    restart: always
    volumes:
      - kaushal_workspaces:/data/workspaces
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      POCKETBASE_URL: ${POCKETBASE_URL:-http://pocketbase:8090}
      PB_SUPERUSER_EMAIL: ${PB_SUPERUSER_EMAIL}
      PB_SUPERUSER_PASSWORD: ${PB_SUPERUSER_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/data/workspaces}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-0}
      INTEGRATED_AI_API_URL: ${INTEGRATED_AI_API_URL:-}
      INTEGRATED_AI_API_KEY: ${INTEGRATED_AI_API_KEY:-}
      WEBSITE_ID: ${WEBSITE_ID:-}
      WEBSITE_DOMAIN: ${WEBSITE_DOMAIN}
      PROXY_ENTRANCE_ID: ${PROXY_ENTRANCE_ID:-}

  web:
    image: nabarun1/kaushalstack-web:latest
    restart: always

  proxy:
    restart: always
    ports:
      - "127.0.0.1:8080:80"

volumes:
  kaushal_workspaces:
