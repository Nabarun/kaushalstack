services:

  ondc-webhook:
    build: .
    restart: always
    env_file: .env
    environment:
      LEADS_DB_PATH: /data/leads.db
    volumes:
      - ondc_leads:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ondc-webhook.entrypoints=websecure"
      - "traefik.http.routers.ondc-webhook.rule=Host(`ondc.kaushalstack.com`)"
      - "traefik.http.routers.ondc-webhook.tls=true"
      - "traefik.http.routers.ondc-webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.ondc-webhook.loadbalancer.server.port=8089"

  ondc-mcp:
    build: .
    restart: always
    env_file: .env
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8090"
      LEADS_DB_PATH: /data/leads.db
    volumes:
      - ondc_leads:/data
    command: python -m src.mcp_server
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ondc-mcp.entrypoints=websecure"
      - "traefik.http.routers.ondc-mcp.rule=Host(`ondc.kaushalstack.com`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.ondc-mcp.tls=true"
      - "traefik.http.routers.ondc-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.ondc-mcp.loadbalancer.server.port=8090"

volumes:
  ondc_leads:
