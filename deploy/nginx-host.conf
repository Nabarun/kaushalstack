# /etc/nginx/sites-available/kaushalstack
# Host-level nginx: handles SSL termination, proxies to Docker on localhost:8080

server {
    listen 80;
    server_name kaushalstack.com www.kaushalstack.com;

    # Let certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://kaushalstack.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name kaushalstack.com www.kaushalstack.com;

    ssl_certificate     /etc/letsencrypt/live/kaushalstack.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaushalstack.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    # Redirect www → non-www
    if ($host = www.kaushalstack.com) {
        return 301 https://kaushalstack.com$request_uri;
    }

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
