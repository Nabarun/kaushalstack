events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    server {
        listen 80;
        server_name localhost;

        # PocketBase proxy
        location /hcgi/platform/ {
            proxy_pass         http://pocketbase:8090/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Express API proxy
        location /hcgi/api/ {
            proxy_pass         http://api:3001/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering    off;
        }

        # The SPA calls /api/* directly (Round Table, BYOK, deploy). In prod
        # Traefik strips /api before the api service; mirror that here so the
        # same frontend works against local Docker. The trailing slash on
        # proxy_pass drops the /api prefix, so the Express app (mounted at /)
        # sees /roundtable, /me/hostinger, /deploy, etc.
        location /api/ {
            proxy_pass         http://api:3001/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering    off;
        }

        # Web app (static files)
        location / {
            proxy_pass http://web:80/;
            proxy_set_header Host $host;
        }
    }
}
